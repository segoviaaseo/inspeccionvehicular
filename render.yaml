services:
  - type: web
    name: vehicle-inspection-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vehicle-inspection-db
          property: connectionString

databases:
  - name: vehicle-inspection-db
    databaseName: vehicle_inspection
    plan: free